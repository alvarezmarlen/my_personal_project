<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Marlen Alvarez"/>
    <meta name="description" content="Bellas prendas artesanales, para usar cada dia, luciendo elegante, bella y juvenil, regala con satisfaccion y acierto">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'><script src="https://kit.fontawesome.com/384e83612b.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../assets/css/login.css">
    <link rel="stylesheet" href="../assets/css/nav.css">
    <title>Store Sumi.chh | Productos</title>
</head>
<body>
    <div id="nav-placeholder"></div>

    <main id="contenedor-login">
        <div class="tarjeta-blanca login-box">
            <h2>Iniciar Sesión</h2>
            <p class="subtitulo-login">¡Hola de nuevo! Entra para gestionar tus pedidos de bisutería.</p>

            <form action="#" method="POST" class="formulario-login">
                <div class="campo">
                    <label for="email">Correo Electrónico *</label>
                    <input type="email" id="email" name="email" required placeholder="ejemplo@correo.com">
                    <span class="error-msg"></span>
                </div>

                <div class="campo">
                    <label for="password">Contraseña *</label>
                    <input type="password" id="password" name="password" required placeholder="Tu contraseña">
                    <span class="error-msg"></span>
                </div>

                <div class="opciones-login">
                    <a href="#" class="enlace-olvido">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="boton-enviar">Entrar</button>
            </form>

            <div id="olvide-overlay" class="checkout-overlay">
                <div class="checkout-modal">
                    <button class="checkout-close" id="olvide-close">&times;</button>
                    <div id="olvide-form-view">
                        <h2>Restablecer Contraseña</h2>
                        <p style="color:#555;font-size:0.9rem;text-align:center;margin:-16px 0 20px;">Te enviaremos un enlace a tu correo</p>
                        <form id="olvide-form" novalidate>
                            <div class="checkout-campo">
                                <label for="olvide-email">Correo electrónico *</label>
                                <input type="email" id="olvide-email" name="email" required placeholder="ejemplo@correo.com">
                                <span class="error-msg"></span>
                            </div>
                            <button type="submit" class="checkout-submit">Enviar enlace</button>
                        </form>
                    </div>
                    <div id="olvide-success-view" class="checkout-success" style="display:none;">
                        <h2 style="color:#00b090;">¡Revisa tu correo!</h2>
                        <p>Te hemos enviado un enlace para restablecer tu contraseña.</p>
                    </div>
                </div>
            </div>

            <div class="registro-sugerencia">
                <p>¿No tienes cuenta? <a href="./registro.html">Regístrate aquí</a></p>
            </div>
        </div>
    </main>
    

    <div id="footer-placeholder"></div>
    

    <script type="module" src="../assets/js/main.js"></script>
</body>
</html>
