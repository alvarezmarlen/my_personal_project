<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Marlen Alvarez"/>
    <meta name="description" content="Bellas prendas artesanales, para usar cada dia, luciendo elegante, bella y juvenil, regala con satisfaccion y acierto">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'><script src="https://kit.fontawesome.com/384e83612b.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../assets/css/carrito.css">
    <title>Store Sumi.chh | Cesta de Compra</title>
</head>
<body>
    <div id="nav-placeholder"></div>

    <main id="contenedor-carrito">
        <section class="productos-carrito">
            <h2>Tu Cesta</h2>
        </section>

        <section class="resumen-carrito">
            <div class="tarjeta-blanca resumen-box">
                <h3>Resumen del pedido</h3>

                <div class="linea-resumen">
                    <span>Subtotal</span>
                    <span id="subtotal-valor">0.00€</span>
                </div>
                <div class="linea-resumen">
                    <span>Envío (Toda España)</span>
                    <span class="envio-gratis" id="envio-valor">4,90€</span>
                </div>

                <hr class="separador-resumen">

                <div class="linea-resumen total">
                    <span>Total</span>
                    <span class="precio-total" id="total-valor">0.00€</span>
                </div>

                <button class="boton-enviar btn-pagar">Proceder al pago</button>

                <a href="./productos.html" class="seguir-comprando">← Seguir comprando</a>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <div id="checkout-overlay" class="checkout-overlay">
        <div class="checkout-modal">
            <button class="checkout-close" id="checkout-close">&times;</button>

            <div id="checkout-form-view">
                <h2>Datos de Envío</h2>
                <form id="checkout-form" novalidate>
                    <div class="checkout-campo">
                        <label for="checkout-nombre">Nombre completo *</label>
                        <input type="text" id="checkout-nombre" name="nombre" required placeholder="María García">
                        <span class="error-msg"></span>
                    </div>
                    <div class="checkout-campo">
                        <label for="checkout-email">Correo electrónico *</label>
                        <input type="email" id="checkout-email" name="email" required placeholder="maria@ejemplo.com">
                        <span class="error-msg"></span>
                    </div>
                    <div class="checkout-campo">
                        <label for="checkout-direccion">Dirección de envío *</label>
                        <input type="text" id="checkout-direccion" name="direccion" required placeholder="Calle Mayor 12, 28001 Madrid">
                        <span class="error-msg"></span>
                    </div>
                    <button type="submit" class="checkout-submit">Confirmar Pedido</button>
                </form>
            </div>

            <div id="checkout-success-view" class="checkout-success" style="display:none;">
                <div class="checkmark-container">
                    <svg class="checkmark" viewBox="0 0 52 52">
                        <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/>
                        <path class="checkmark-check" fill="none" d="M14 27l7 7 16-16"/>
                    </svg>
                </div>
                <h2>¡Pedido Confirmado!</h2>
                <p>Gracias por tu compra, <span id="success-nombre"></span>.</p>
                <p class="success-detalle">Recibirás un correo de confirmación en breve.</p>
                <a href="cuenta.html" class="btn-pedidos" style="display:inline-block;margin-top:20px;padding:12px 28px;background:#f7d6d6;color:#333;border-radius:25px;text-decoration:none;font-weight:bold;">Ver mis pedidos</a>
            </div>
        </div>
    </div>

    <script type="module" src="../assets/js/main.js"></script>
</body>
</html>
