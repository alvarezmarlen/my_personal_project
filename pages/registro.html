<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - Sumi.chh</title>
    <link rel="stylesheet" href="../assets/css/login.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="nav-placeholder"></div>

    <main id="contenedor-login">
        <div class="tarjeta-blanca login-box">
            <h2>Crear Cuenta</h2>
            <p class="subtitulo-login">Regístrate para guardar tus diseños favoritos y comprar más rápido.</p>

            <form action="#" method="POST" class="formulario-login">
                <div class="campo">
                    <label for="nombre">Nombre Completo *</label>
                    <input type="text" id="nombre" name="nombre" required placeholder="Tu nombre y apellidos">
                </div>

                <div class="campo">
                    <label for="email">Correo Electrónico *</label>
                    <input type="email" id="email" name="email" required placeholder="ejemplo@correo.com">
                </div>

                <div class="campo">
                    <label for="password">Contraseña *</label>
                    <input type="password" id="password" name="password" required placeholder="Mínimo 6 caracteres">
                </div>

                <div class="campo">
                    <label for="confirm-password">Confirmar Contraseña *</label>
                    <input type="password" id="confirm-password" name="confirm-password" required placeholder="Repite tu contraseña">
                </div>

                <button type="submit" class="boton-enviar">Registrarse</button>
                
            </form>

            <div class="registro-sugerencia">
                <p>¿Ya tienes una cuenta? <a href="/pages/login.html">Inicia sesión aquí</a></p>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module" src="../assets/js/main.js"></script>
</body>
</html>
