<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Marlen Alvarez"/>
    <meta name="description" content="Bellas prendas artesanales, para usar cada dia, luciendo elegante, bella y juvenil, regala con satisfaccion y acierto">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'><script src="https://kit.fontawesome.com/384e83612b.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../assets/css/login.css">
    <title>Store Sumi.chh | Crear Cuenta</title>
</head>
<body>
    <div id="nav-placeholder"></div>

    <main id="contenedor-login">
        <div class="tarjeta-blanca login-box">
            <h2>Crear Cuenta</h2>
            <p class="subtitulo-login">Regístrate para guardar tus diseños favoritos y comprar más rápido.</p>

            <form action="#" method="POST" class="formulario-login">
                <div class="campo">
                    <label for="nombre">Nombre Completo *</label>
                    <input type="text" id="nombre" name="nombre" required placeholder="Tu nombre y apellidos">
                    <span class="error-msg"></span>
                </div>

                <div class="campo">
                    <label for="email">Correo Electrónico *</label>
                    <input type="email" id="email" name="email" required placeholder="ejemplo@correo.com">
                    <span class="error-msg"></span>
                </div>

                <div class="campo">
                    <label for="password">Contraseña *</label>
                    <input type="password" id="password" name="password" required placeholder="Mínimo 6 caracteres">
                    <span class="error-msg"></span>
                </div>

                <div class="campo">
                    <label for="confirm-password">Confirmar Contraseña *</label>
                    <input type="password" id="confirm-password" name="confirm-password" required placeholder="Repite tu contraseña">
                    <span class="error-msg"></span>
                </div>

                <button type="submit" class="boton-enviar">Registrarse</button>
                
            </form>

            <div class="registro-sugerencia">
                <p>¿Ya tienes una cuenta? <a href="./login.html">Inicia sesión aquí</a></p>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module" src="../assets/js/main.js"></script>
</body>
</html>
